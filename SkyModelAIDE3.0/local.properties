# SDK path - update this to point to your Android SDK installation
# AIDE users: this file is not needed, AIDE manages the SDK path internally
# Gradle users: update sdk.dir to your local Android SDK path
# Example (Windows): sdk.dir=C\:\\Users\\YourName\\AppData\\Local\\Android\\Sdk
# Example (Mac):     sdk.dir=/Users/YourName/Library/Android/sdk
# Example (Linux):   sdk.dir=/home/YourName/Android/Sdk
sdk.dir=/opt/android-sdk
